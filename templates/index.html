<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            height: 70vh;
            max-height: 600px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 10px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .user .message-content {
            background: #667eea;
            color: white;
            border-radius: 15px 15px 0 15px;
        }
        
        .agent .message-content {
            background: #f0f0f0;
            color: #333;
            border-radius: 15px 15px 15px 0;
        }
        
        .agent .message-content {
            text-align: left;
        }
        
        .input-area {
            border-top: 1px solid #eee;
            padding: 15px;
            display: flex;
            gap: 10px;
        }
        
        input[type="text"] {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            border-color: #667eea;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            display: flex;
            gap: 5px;
            align-items: center;
            font-size: 12px;
            color: #999;
        }
        
        .loading span {
            animation: pulse 1.5s infinite;
        }
        
        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Crypto Agent</h1>
            <p>Hỏi tôi về giá crypto</p>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message agent">
                <div class="message-content">Chào bạn! 👋 Tôi là Crypto Agent. Hỏi tôi về giá các đồng tiền điện tử hoặc lịch sử giá của chúng.</div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Hỏi tôi gì đi..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">Gửi</button>
        </div>
    </div>
    
    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        function addMessage(text, isUser) {
            const msgEl = document.createElement('div');
            msgEl.className = `message ${isUser ? 'user' : 'agent'}`;
            msgEl.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            chatArea.appendChild(msgEl);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;
            
            addMessage('⏳ Đang suy nghĩ...', false);
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                chatArea.removeChild(chatArea.lastChild);
                
                if (response.ok) {
                    const data = await response.json();
                    addMessage(data.reply, false);
                } else {
                    const data = await response.json();
                    addMessage(`Lỗi: ${data.error || 'Không rõ'}`, false);
                }
            } catch (err) {
                chatArea.removeChild(chatArea.lastChild);
                addMessage(`Lỗi kết nối: ${err.message}`, false);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }
    </script>
</body>
</html>
